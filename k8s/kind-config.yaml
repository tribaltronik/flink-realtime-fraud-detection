kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: flink-fraud
nodes:
  - role: control-plane
    image: kindest/node:v1.32.8
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8081
        protocol: TCP
      - containerPort: 30092
        hostPort: 9092
        protocol: TCP
